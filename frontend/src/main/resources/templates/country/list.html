<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countries — Film Rental Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" type="image/svg+xml" th:href="@{/img/logo.svg}"/>
</head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt="Logo"/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>

  <div class="page-header">
    <div><h1><span>Countries</span></h1><p>All registered countries in the system</p></div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
      <a href="/countries/create" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Country</a>
    </div>
  </div>

  <!-- Search by Name -->
  <form class="filter-panel" method="get" th:action="@{/countries/search}">
    <div class="filter-field" style="flex:2">
      <label for="name">Search by Country Name</label>
      <input id="name" type="text" name="name" placeholder="e.g. India"/>
    </div>
    <div class="filter-actions">
      <button type="submit" class="btn btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <a href="/countries" class="btn btn-ghost">Clear</a>
    </div>
  </form>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Country Name</th><th>Last Update</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(countries)}">
            <td colspan="4"><div class="empty-state"><p>No countries found. Add your first country.</p></div></td>
          </tr>
          <tr th:each="c : ${countries}">
            <td th:text="${c.countryId}"></td>
            <td th:text="${c.country}"></td>
            <td th:text="${c.lastUpdate}"></td>
            <td>
              <div class="row-actions">
                <a class="action-btn view" th:href="@{/countries/{id}(id=${c.countryId})}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View
                </a>
                <a class="action-btn edit" th:href="@{/countries/{id}/edit(id=${c.countryId})}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:replace="~{fragments/pagination :: pagination('/countries', ${currentPage}, ${totalPages})}"></div>
    </div>
  </div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span><span>Running on <a href="#">localhost:8082</a></span></footer>
</body>
</html>
