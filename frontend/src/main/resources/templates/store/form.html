<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Store Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:if="${store==null}">Add <span>Store</span></h1><h1 th:if="${store!=null}">Edit <span>Store</span></h1></div>
    <a href="/stores" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:if="${store==null}" action="/stores/save" method="post">
      <div class="form-group"><label>Manager Staff ID *</label><input name="managerStaffId" type="number" required/>
        <p class="hint"><a href="/staff" style="color:var(--gold)">Browse staff →</a></p></div>
      <div class="form-group"><label>Address ID *</label><input name="addressId" type="number" required/>
        <p class="hint"><a href="/addresses" style="color:var(--gold)">Browse addresses →</a></p></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><a href="/stores" class="btn btn-ghost">Cancel</a></div>
    </form>
    <form th:if="${store!=null}" th:action="@{/stores/{id}/update(id=${storeId})}" method="post">
      <div class="form-group"><label>Manager Staff ID *</label><input name="managerStaffId" type="number" th:value="${store.managerStaffId}" required/></div>
      <div class="form-group"><label>Address ID *</label><input name="addressId" type="number" th:value="${store.addressId}" required/></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Update</button><a href="/stores" class="btn btn-ghost">Cancel</a></div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
