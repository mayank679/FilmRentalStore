<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Store Detail — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Store <span th:text="'#'+${store.storeId}"></span></h1></div>
    <div style="display:flex;gap:.5rem"><a th:href="@{/stores/{id}/edit(id=${store.storeId})}" class="btn btn-primary">Edit</a><a href="/stores" class="btn btn-ghost">← Back</a></div>
  </div>
  <div class="card"><div class="card-body"><dl class="detail-grid">
    <dt>Store ID</dt><dd th:text="${store.storeId}"></dd>
    <dt>Manager Staff ID</dt><dd th:text="${store.managerStaffId}"></dd>
    <dt>Address ID</dt><dd th:text="${store.addressId}"></dd>
    <dt>Last Update</dt><dd th:text="${store.lastUpdate}"></dd>
  </dl></div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
