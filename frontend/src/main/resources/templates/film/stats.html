<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film Stats — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<style>
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; text-align: center; }
.stat-card .stat-value { font-family: var(--font-display); font-size: 2rem; color: var(--gold); font-weight: 700; }
.stat-card .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-top: .4rem; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Film <span>Statistics</span></h1><p>Aggregate data from the film catalog</p></div>
    <a href="/films" class="btn btn-ghost">← Back</a>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" th:text="${avgRentalRate}">—</div>
      <div class="stat-label">Avg Rental Rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" th:text="${avgLength}">—</div>
      <div class="stat-label">Avg Film Length (min)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" th:text="${totalReplacementCost}">—</div>
      <div class="stat-label">Total Replacement Cost</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
    <div>
      <h2 style="font-family:var(--font-display);color:var(--gold);margin-bottom:1rem;font-size:1.1rem">Films by Category</h2>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>Category</th><th>Count</th></tr></thead>
        <tbody>
          <tr th:if="${countByCategory == null or #lists.isEmpty(countByCategory)}">
            <td colspan="2"><div class="empty-state"><p>No data.</p></div></td>
          </tr>
          <tr th:each="entry : ${countByCategory}">
            <td th:text="${entry.categoryName}"></td>
            <td th:text="${entry.filmCount}"></td>
          </tr>
        </tbody>
      </table></div></div>
    </div>
    <div>
      <h2 style="font-family:var(--font-display);color:var(--gold);margin-bottom:1rem;font-size:1.1rem">Films by Rating</h2>
      <div class="card"><div class="table-wrap"><table>
        <thead><tr><th>Rating</th><th>Count</th></tr></thead>
        <tbody>
          <tr th:if="${countByRating == null or #lists.isEmpty(countByRating)}">
            <td colspan="2"><div class="empty-state"><p>No data.</p></div></td>
          </tr>
          <tr th:each="entry : ${countByRating}">
            <td><span class="badge" th:text="${entry[0]}"></span></td>
            <td th:text="${entry[1]}"></td>
          </tr>
        </tbody>
      </table></div></div>
    </div>
  </div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
