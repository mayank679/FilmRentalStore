<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Edit Film — Film Rental</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
    <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
    <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
    <div class="page-header">
        <div><h1>Edit <span>Film</span> <small style="font-size:.7em;color:var(--gold-dim);">(Full Update — PUT)</small></h1></div>
        <a th:href="@{/films/{id}(id=${filmId})}" class="btn btn-ghost">← Back</a>
    </div>

    <div th:if="${error}" style="color:red;background:#2a0000;border:1px solid #a00;padding:.8rem 1.2rem;border-radius:6px;margin-bottom:1rem;" th:text="${error}"></div>

    <div class="card form-card"><div class="card-body">
        <form th:action="@{/films/{id}/update(id=${filmId})}" method="post">

            <div class="form-group">
                <label>Title *</label>
                <input name="title" type="text" th:value="${film.title}" required/>
            </div>

            <div class="form-group">
                <label>Description</label>
                <input name="description" type="text" th:value="${film.description}"/>
            </div>

            <div class="form-group">
                <label>Release Year</label>
                <input name="releaseYear" type="number" th:value="${film.releaseYear}"/>
            </div>

            <div class="form-group">
                <label>Language ID *</label>
                <input name="languageId" type="number" th:value="${film['languageId']}" required/>
                <p class="hint"><a href="/languages" style="color:var(--gold)">Browse languages →</a></p>
            </div>

            <div class="form-group">
                <label>Rental Duration (days)</label>
                <input name="rentalDuration" type="number" th:value="${film.rentalDuration}"/>
            </div>

            <div class="form-group">
                <label>Rental Rate</label>
                <input name="rentalRate" type="text" th:value="${film.rentalRate}"/>
            </div>

            <div class="form-group">
                <label>Length (minutes)</label>
                <input name="length" type="number" th:value="${film.length}"/>
            </div>

            <div class="form-group">
                <label>Replacement Cost</label>
                <input name="replacementCost" type="text" th:value="${film.replacementCost}"/>
            </div>

            <div class="form-group">
                <label>Rating</label>
                <select name="rating">
                    <option value="">Select...</option>
                    <option th:each="r : ${'G,PG,PG-13,R,NC-17'.split(',')}"
                            th:value="${r}" th:text="${r}"
                            th:selected="${r == film.rating}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Special Features</label>
                <input name="specialFeatures" type="text" th:value="${film.specialFeatures}"/>
            </div>

            <div class="form-group">
                <label>Category ID</label>
                <input name="categoryIds" type="number" placeholder="3"/>
                <p class="hint"><a href="/categories" style="color:var(--gold)">Browse categories →</a></p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Film (PUT)</button>
                <a th:href="@{/films/{id}(id=${filmId})}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
