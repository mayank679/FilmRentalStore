<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Add Film — Film Rental</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Add <span>Film</span></h1></div>
    <a href="/films" class="btn btn-ghost">← Back</a>
  </div>

  <div th:if="${error}" style="color:red;background:#2a0000;border:1px solid #a00;padding:.8rem 1.2rem;border-radius:6px;margin-bottom:1rem;" th:text="${error}"></div>

  <div class="card form-card"><div class="card-body">
    <form action="/films/save" method="post">

      <div class="form-group">
        <label>Title *</label>
        <input name="title" type="text" required placeholder="ACADEMY DINOSAUR"/>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input name="description" type="text" placeholder="A description..."/>
      </div>

      <div class="form-group">
        <label>Release Year</label>
        <input name="releaseYear" type="number" placeholder="2006"/>
      </div>

      <div class="form-group">
        <label>Language ID *</label>
        <input name="languageId" type="number" required placeholder="1"/>
        <p class="hint"><a href="/languages" style="color:var(--gold)">Browse languages →</a></p>
      </div>

      <div class="form-group">
        <label>Rental Duration (days)</label>
        <input name="rentalDuration" type="number" placeholder="3"/>
      </div>

      <div class="form-group">
        <label>Rental Rate</label>
        <input name="rentalRate" type="text" placeholder="4.99"/>
      </div>

      <div class="form-group">
        <label>Length (minutes)</label>
        <input name="length" type="number" placeholder="120"/>
      </div>

      <div class="form-group">
        <label>Replacement Cost</label>
        <input name="replacementCost" type="text" placeholder="19.99"/>
      </div>

      <div class="form-group">
        <label>Rating</label>
        <select name="rating">
          <option value="">Select...</option>
          <option>G</option><option>PG</option><option>PG-13</option><option>R</option><option>NC-17</option>
        </select>
      </div>

      <div class="form-group">
        <label>Special Features</label>
        <input name="specialFeatures" type="text" placeholder="Behind the Scenes"/>
      </div>

      <div class="form-group">
        <label>Category ID</label>
        <input name="categoryIds" type="number" placeholder="3"/>
        <p class="hint"><a href="/categories" style="color:var(--gold)">Browse categories →</a></p>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Film</button>
        <a href="/films" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
