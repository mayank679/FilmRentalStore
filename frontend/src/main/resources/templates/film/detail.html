<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film Detail — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Film <span th:text="'#'+${film.filmId}"></span></h1><p th:text="${film.title}"></p></div>
    <div style="display:flex;gap:.5rem"><a th:href="@{/films/{id}/edit(id=${film.filmId})}" class="btn btn-primary">Edit</a><a href="/films" class="btn btn-ghost">← Back</a></div>
  </div>
  <div class="card"><div class="card-body"><dl class="detail-grid">
    <dt>Film ID</dt><dd th:text="${film.filmId}"></dd>
    <dt>Title</dt><dd th:text="${film.title}"></dd>
    <dt>Description</dt><dd th:text="${film.description}"></dd>
    <dt>Release Year</dt><dd th:text="${film.releaseYear}"></dd>
    <dt>Language</dt><dd th:text="${film['languageName']}"></dd>
    <dt>Rating</dt><dd th:text="${film.rating}"></dd>
    <dt>Rental Rate</dt><dd th:text="${film.rentalRate}"></dd>
    <dt>Rental Duration</dt><dd th:text="${film.rentalDuration}"></dd>
    <dt>Length</dt><dd th:text="${film.length}"></dd>
    <dt>Replacement Cost</dt><dd th:text="${film.replacementCost}"></dd>
    <dt>Last Update</dt><dd th:text="${film['lastUpdate']}"></dd>
  </dl></div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
