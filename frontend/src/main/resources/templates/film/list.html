<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Films — Film Rental</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div><h1><span>Films</span></h1><p>All films in the system</p></div>
    <div style="display:flex;gap:.5rem">
      <a href="/films/stats" class="btn btn-outline">📊 Stats</a>
      <a href="/films/search" class="btn btn-ghost">Search</a>
      <a href="/films/create" class="btn btn-primary">+ Add Film</a>
    </div>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>Title</th><th>Year</th><th>Rating</th><th>Rental Rate</th><th>Length</th><th>Actions</th></tr></thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(films)}"><td colspan="7"><div class="empty-state"><p>No films found.</p></div></td></tr>
    <tr th:each="f : ${films}">
      <td th:text="${f.filmId}"></td>
      <td th:text="${f.title}"></td>
      <td th:text="${f.releaseYear}"></td>
      <td><span class="badge" th:text="${f.rating}"></span></td>
      <td th:text="${f.rentalRate}"></td>
      <td th:text="${f.length}"></td>
      <td><div class="row-actions">
        <a class="action-btn view" th:href="@{/films/{id}(id=${f.filmId})}">View</a>
        <a class="action-btn view" th:href="@{/films/{id}/categories(id=${f.filmId})}" style="font-size:.72rem">Cats</a>
        <a class="action-btn edit" th:href="@{/films/{id}/edit(id=${f.filmId})}">Edit</a>
      </div></td>
    </tr>
    </tbody>
  </table></div></div>
  <!-- Pagination -->
  <div th:replace="~{fragments/pagination :: pagination('/films', ${currentPage}, ${totalPages})}"></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
