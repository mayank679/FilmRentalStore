<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film-Actor Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:text="${filmactor != null} ? 'Edit Film-Actor' : 'Add Film-Actor'"><span>Film-Actor</span></h1></div>
    <a href="/filmactors" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:action="${filmactor != null} ? @{/filmactors/{a}/{f}/update(a=${filmactor.actorId},f=${filmactor.filmId})} : @{/filmactors/save}" method="post">
      <div th:if="${filmactor != null}">
        <div class="form-group">
          <label>New Actor ID *</label>
          <input name="newActorId" type="number" required th:value="${filmactor.actorId}"/>
        </div>
        <div class="form-group">
          <label>New Film ID *</label>
          <input name="newFilmId" type="number" required th:value="${filmactor.filmId}"/>
        </div>
      </div>
      <div th:if="${filmactor == null}">
        <div class="form-group">
          <label>Actor ID *</label>
          <input name="actorId" type="number" required placeholder="1"/>
        </div>
        <div class="form-group">
          <label>Film ID *</label>
          <input name="filmId" type="number" required placeholder="1"/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" th:text="${filmactor != null} ? 'Update' : 'Save'">Save</button>
        <a href="/filmactors" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
