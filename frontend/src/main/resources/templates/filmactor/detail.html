<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film-Actor Detail — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Film-Actor <span>Detail</span></h1><p>Association record</p></div>
    <div style="display:flex;gap:.5rem">
      <a th:href="@{/filmactors/{a}/{f}/edit(a=${filmactor.actorId},f=${filmactor.filmId})}" class="btn btn-outline">Edit</a>
      <a href="/filmactors" class="btn btn-ghost">← Back</a>
    </div>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <div class="detail-card">
    <dl class="detail-grid">
      <dt>Actor ID</dt><dd th:text="${filmactor.actorId}"></dd>
      <dt>Film ID</dt><dd th:text="${filmactor.filmId}"></dd>
      <dt>Last Update</dt><dd th:text="${filmactor.lastUpdate}"></dd>
    </dl>
  </div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
