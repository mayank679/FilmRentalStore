<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Detail — Film Rental Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" type="image/svg+xml" th:href="@{/img/logo.svg}"/>
</head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt="Logo"/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>

<div class="page-wrapper">
  <div th:if="${city != null}">
    <div class="page-header">
      <div>
        <h1>City <span th:text="'#' + ${city.cityId}"></span></h1>
        <p th:text="${city.city}"></p>
      </div>
      <div style="display:flex;gap:0.5rem">
        <a th:href="@{/cities/{id}/edit(id=${city.cityId})}" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </a>
        <a href="/cities" class="btn btn-ghost">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back
        </a>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <dl class="detail-grid">
          <dt>City ID</dt>
          <dd th:text="${city.cityId}"></dd>

          <dt>City Name</dt>
          <dd th:text="${city.city}"></dd>

          <dt>Country</dt>
          <dd>
            <a th:if="${city.countryId != null}"
               th:href="@{/countries/{id}(id=${city.countryId})}"
               th:text="'Country #' + ${city.countryId}"
               style="color:var(--gold)"></a>
            <span th:if="${city.countryId == null}">—</span>
          </dd>

          <dt>Last Update</dt>
          <dd th:text="${city.lastUpdate != null ? city.lastUpdate : '—'}"></dd>
        </dl>
      </div>
    </div>
  </div>

  <div th:if="${city == null}">
    <div class="page-header"><div><h1>City <span>Not Found</span></h1></div></div>
    <div class="card"><div class="card-body"><p>The requested city does not exist.</p>
      <a href="/cities" class="btn btn-ghost" style="margin-top:1rem">← Back to Cities</a>
    </div></div>
  </div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span><span>Running on <a href="#">localhost:8082</a></span></footer>
</body>
</html>
