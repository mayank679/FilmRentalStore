<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film-Text Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:if="${filmtext == null}">Add <span>Film Text</span></h1><h1 th:if="${filmtext != null}">Edit <span>Film Text</span></h1></div>
    <a href="/filmtexts" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:if="${filmtext == null}" action="/filmtexts/save" method="post">
      <div class="form-group"><label>Film ID *</label><input name="filmId" type="number" required placeholder="123"/></div>
      <div class="form-group"><label>Title *</label><input name="title" type="text" required placeholder="Epic Movie"/></div>
      <div class="form-group"><label>Description *</label><textarea name="description" required rows="4" placeholder="Description of the film"></textarea></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save Film Text</button><a href="/filmtexts" class="btn btn-ghost">Cancel</a></div>
    </form>
    <form th:if="${filmtext != null}" th:action="@{/filmtexts/{id}/update(id=${filmtext.filmId})}" method="post">
      <div class="form-group"><label>Title *</label><input name="title" type="text" th:value="${filmtext.title}" required/></div>
      <div class="form-group"><label>Description *</label><textarea name="description" th:text="${filmtext.description}" required rows="4"></textarea></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Update Film Text</button><a href="/filmtexts/{id}(id=${filmtext.filmId})" class="btn btn-ghost">Cancel</a></div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
