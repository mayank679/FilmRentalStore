<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Actors — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div><h1><span>Actors</span></h1><p>All actors in the system</p></div>
    <div style="display:flex;gap:.5rem">
      <a href="/actors/search" class="btn btn-ghost">Search</a>
      <a href="/actors/create" class="btn btn-primary">+ Add Actor</a>
    </div>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Last Update</th><th>Actions</th></tr></thead>
    <tbody>
      <tr th:if="${actors == null or actors.isEmpty()}"><td colspan="5"><div class="empty-state"><p>No actors found.</p></div></td></tr>
      <tr th:each="a : ${actors}">
        <td th:text="${a.actorId}"></td>
        <td th:text="${a.firstName}"></td>
        <td th:text="${a.lastName}"></td>
        <td th:text="${a.lastUpdate}"></td>
        <td><div class="row-actions">
          <a class="action-btn view" th:href="@{/actors/{id}(id=${a.actorId})}">View</a>
          <a class="action-btn edit" th:href="@{/actors/{id}/edit(id=${a.actorId})}">Edit</a>
        </div></td>
      </tr>
    </tbody>
  </table>
      <div th:replace="~{fragments/pagination :: pagination('/actors', ${currentPage}, ${totalPages})}"></div>
</div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
