<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Rental Detail — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Rental <span th:text="'#'+${rental.rentalId}"></span></h1></div>
    <div style="display:flex;gap:.5rem"><a th:href="@{/rentals/{id}/edit(id=${rental.rentalId})}" class="btn btn-primary">Edit</a><a href="/rentals" class="btn btn-ghost">← Back</a></div>
  </div>
  <div class="card"><div class="card-body"><dl class="detail-grid">
    <dt>Rental ID</dt><dd th:text="${rental.rentalId}"></dd>
    <dt>Customer ID</dt><dd th:text="${rental.customerId}"></dd>
    <dt>Inventory ID</dt><dd th:text="${rental.inventoryId}"></dd>
    <dt>Staff ID</dt><dd th:text="${rental.staffId}"></dd>
    <dt>Rental Date</dt><dd th:text="${rental.rentalDate}"></dd>
    <dt>Return Date</dt><dd th:text="${rental.returnDate != null ? rental.returnDate : '—'}"></dd>
    <dt>Last Update</dt><dd th:text="${rental['lastUpdate']}"></dd>
  </dl></div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
