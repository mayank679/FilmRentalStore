<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Rentals — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div><h1><span>Rentals</span></h1><p>All rental records</p></div>
    <div style="display:flex;gap:.5rem">
      <a href="/rentals/search" class="btn btn-ghost">Advanced Search</a>
      <a href="/rentals/create" class="btn btn-primary">+ New Rental</a>
    </div>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <form class="filter-panel" method="get" th:action="@{/rentals}">
    <div class="filter-field"><label>Customer ID</label><input name="customerId" type="number" th:value="${filterCustomerId}" placeholder="1"/></div>
    <div class="filter-field"><label>Staff ID</label><input name="staffId" type="number" th:value="${filterStaffId}" placeholder="1"/></div>
    <div class="filter-field"><label>Inventory ID</label><input name="inventoryId" type="number" th:value="${filterInventoryId}" placeholder="1"/></div>
    <div class="filter-actions"><button type="submit" class="btn btn-primary">Filter</button><a href="/rentals" class="btn btn-ghost">Clear</a></div>
  </form>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>Customer ID</th><th>Inventory ID</th><th>Staff ID</th><th>Rental Date</th><th>Return Date</th><th>Actions</th></tr></thead>
    <tbody>
      <tr th:if="${#lists.isEmpty(rentals)}"><td colspan="7"><div class="empty-state"><p>No rentals.</p></div></td></tr>
      <tr th:each="r : ${rentals}">
        <td th:text="${r.rentalId}"></td><td th:text="${r.customerId}"></td><td th:text="${r.inventoryId}"></td>
        <td th:text="${r.staffId}"></td><td th:text="${r.rentalDate}"></td><td th:text="${r.returnDate}"></td>
        <td><div class="row-actions">
          <a class="action-btn view" th:href="@{/rentals/{id}(id=${r.rentalId})}">View</a>
          <a class="action-btn edit" th:href="@{/rentals/{id}/edit(id=${r.rentalId})}">Edit</a>
        </div></td>
      </tr>
    </tbody>
  </table>
      <div th:replace="~{fragments/pagination :: pagination('/rentals', ${currentPage}, ${totalPages})}"></div>
</div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
