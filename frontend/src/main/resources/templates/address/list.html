<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Addresses — Film Rental Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" type="image/svg+xml" th:href="@{/img/logo.svg}"/>
</head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt="Logo"/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>

  <div class="page-header">
    <div><h1><span>Addresses</span></h1><p>All registered addresses in the system</p></div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
      <a href="/addresses/location" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        With Location
      </a>
      <a href="/addresses/create" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Address</a>
    </div>
  </div>

  <!-- Filter Panel -->
  <form class="filter-panel" method="get" th:action="@{/addresses/search}">
    <div class="filter-field">
      <label for="district">District</label>
      <input id="district" type="text" name="district" placeholder="e.g. West Bengal"/>
    </div>
    <div class="filter-field">
      <label for="postalCode">Postal Code</label>
      <input id="postalCode" type="text" name="postalCode" placeholder="e.g. 700016"/>
    </div>
    <div class="filter-field">
      <label for="phone">Phone</label>
      <input id="phone" type="text" name="phone" placeholder="e.g. 033-12345678"/>
    </div>
    <div class="filter-field">
      <label for="cityId">City ID</label>
      <input id="cityId" type="number" name="cityId" placeholder="e.g. 300"/>
    </div>
    <div class="filter-actions">
      <button type="submit" class="btn btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <a href="/addresses" class="btn btn-ghost">Clear</a>
    </div>
  </form>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Address</th><th>District</th><th>City ID</th><th>Postal Code</th><th>Phone</th><th>Location</th><th>Last Update</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(addresses)}">
            <td colspan="9"><div class="empty-state"><p>No addresses found. Add your first address.</p></div></td>
          </tr>
          <tr th:each="a : ${addresses}">
            <td th:text="${a.addressId}"></td>
            <td th:text="${a.address}"></td>
            <td th:text="${a.district}"></td>
            <td><a th:href="@{/cities/{id}(id=${a.cityId})}" th:text="${a.cityId}" style="color:var(--gold);text-decoration:none"></a></td>
            <td th:text="${a.postalCode != null ? a.postalCode : '—'}"></td>
            <td th:text="${a.phone}"></td>
            <td>
              <span th:if="${a.location != null}" class="badge">📍 Located</span>
              <span th:if="${a.location == null}" style="color:var(--text-muted)">—</span>
            </td>
            <td th:text="${a.lastUpdate}"></td>
            <td>
              <div class="row-actions">
                <a class="action-btn view" th:href="@{/addresses/{id}(id=${a.addressId})}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View
                </a>
                <a class="action-btn edit" th:href="@{/addresses/{id}/edit(id=${a.addressId})}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:replace="~{fragments/pagination :: pagination('/addresses', ${currentPage}, ${totalPages})}"></div>
    </div>
  </div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span><span>Running on <a href="#">localhost:8082</a></span></footer>
</body>
</html>
