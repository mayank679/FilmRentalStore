<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${member.name} + ' — APIs | Film Rental'">Member APIs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0d0f;--surface:#141418;--surface2:#1c1c22;--border:#2a2a35;--gold:#c9a84c;--gold-light:#e2c97e;--gold-dim:#7a6230;--text:#e8e6e0;--text-muted:#7a7870;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',sans-serif;--radius:6px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-weight:300;font-size:15px;line-height:1.7;min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(201,168,76,.04) 0%,transparent 60%);}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

    /* NAV */
    .navbar{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);}
    .navbar-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
    .navbar-brand svg{width:32px;height:32px;}
    .navbar-brand span{font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:var(--gold);letter-spacing:.04em;}
    .navbar-brand span em{font-style:normal;color:var(--text);font-weight:400;}
    .breadcrumb{display:flex;align-items:center;gap:.55rem;font-size:.82rem;}
    .breadcrumb a{color:var(--text-muted);text-decoration:none;transition:color .2s;}.breadcrumb a:hover{color:var(--gold);}
    .breadcrumb .sep{color:var(--border);}
    .breadcrumb strong{color:var(--gold);}

    /* PAGE HEADER */
    .page-header{max-width:1100px;margin:0 auto;padding:3rem 2rem 1.5rem;display:flex;align-items:center;gap:2rem;}
    .member-avatar{width:80px;height:80px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:#0d0d0f;letter-spacing:.04em;}
    .page-header-text h1{font-family:var(--font-display);font-size:2.5rem;font-weight:700;line-height:1.1;color:var(--text);}
    .page-header-text h1 em{font-style:italic;color:var(--gold);}
    .page-header-text p{color:var(--text-muted);font-size:.9rem;margin-top:.4rem;}

    /* CONTENT */
    .content{max-width:1100px;margin:0 auto;padding:0 2rem 6rem;}

    .section-head{display:flex;align-items:center;gap:1rem;margin:2.5rem 0 1.25rem;}
    .section-head h2{font-family:var(--font-display);font-size:1.4rem;font-weight:600;color:var(--text);}
    .section-head .line{flex:1;height:1px;background:var(--border);}
    .section-head .entity-link{display:inline-flex;align-items:center;gap:.5rem;padding:.3rem .85rem;border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text-muted);text-decoration:none;background:var(--surface);transition:border-color .2s,color .2s;}
    .section-head .entity-link:hover{border-color:var(--gold-dim);color:var(--gold);}

    /* API CARDS */
    .api-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem;margin-bottom:1rem;}
    .api-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.55rem;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:pointer;}
    .api-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.45);}
    .api-top{display:flex;align-items:center;gap:.7rem;}
    .method-badge{font-size:.6rem;letter-spacing:.1em;font-weight:600;padding:.22rem .58rem;border-radius:4px;min-width:44px;text-align:center;flex-shrink:0;}
    .method-GET{background:rgba(20,184,166,.12);color:#14b8a6;border:1px solid rgba(20,184,166,.25);}
    .method-POST{background:rgba(201,168,76,.12);color:#c9a84c;border:1px solid rgba(201,168,76,.25);}
    .method-PUT{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
    .method-PATCH{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25);}
    .method-DELETE{background:rgba(244,63,94,.12);color:#f43f5e;border:1px solid rgba(244,63,94,.25);}
    .api-path{font-family:'Courier New',monospace;font-size:.76rem;color:var(--text);word-break:break-all;}
    .api-desc{font-size:.77rem;color:var(--text-muted);line-height:1.45;}
    .api-action{margin-top:.2rem;display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--gold-dim);transition:color .2s,gap .2s;}
    .api-card:hover .api-action{color:var(--gold-light);gap:.6rem;}
    /* non-clickable card style */
    .api-card.no-link{cursor:default;}
    .api-card.no-link:hover{border-color:var(--border);transform:none;box-shadow:none;}

    .footer{border-top:1px solid var(--border);padding:1.5rem 2.5rem;display:flex;align-items:center;justify-content:space-between;color:var(--text-muted);font-size:.8rem;}
    .footer a{color:var(--gold-dim);text-decoration:none;}.footer a:hover{color:var(--gold);}

    @media(max-width:640px){.navbar{padding:0 1rem}.page-header{flex-direction:column;align-items:flex-start;gap:1rem;padding:2rem 1rem 1.25rem}.content{padding:0 1rem 4rem}.api-grid{grid-template-columns:1fr}.footer{flex-direction:column;gap:.5rem;text-align:center}}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/members" class="navbar-brand">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="16" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="5" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="20" cy="9"  r="2.5" fill="#c9a84c" opacity=".6"/>
      <circle cx="20" cy="31" r="2.5" fill="#c9a84c" opacity=".6"/>
      <circle cx="9"  cy="20" r="2.5" fill="#c9a84c" opacity=".6"/>
      <circle cx="31" cy="20" r="2.5" fill="#c9a84c" opacity=".6"/>
      <circle cx="13" cy="13" r="2.5" fill="#c9a84c" opacity=".35"/>
      <circle cx="27" cy="27" r="2.5" fill="#c9a84c" opacity=".35"/>
      <circle cx="27" cy="13" r="2.5" fill="#c9a84c" opacity=".35"/>
      <circle cx="13" cy="27" r="2.5" fill="#c9a84c" opacity=".35"/>
    </svg>
    <span>Film<em>Rental</em></span>
  </a>
  <div class="breadcrumb">
    <a href="/members">Team</a>
    <span class="sep">/</span>
    <strong th:text="${member.name}">Member</strong>
  </div>
</nav>

<div class="page-header">
	<div th:if="${member.name == 'Mayank Raj'}"
	     style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;">
	  <img src="/img/Mayank.jpg" alt="Mayank Raj"
	       style="width:90px;height:90px;object-fit:cover;object-position:center 15%;display:block;border-radius:50%;"/>
	</div>
	<div th:if="${member.name == 'Akshay Raj Saxena'}"
	     style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;">
	  <img src="/img/Akshay.jpg" alt="Akshay Raj Saxena"
	       style="width:90px;height:90px;object-fit:cover;object-position:center 15%;display:block;border-radius:50%;"/>
	</div>
	<div th:if="${member.name == 'Adrija Ghosh'}"
		     style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;">
		  <img src="/img/Adrija.jpg" alt="Adrija Ghosh"
		       style="width:90px;height:90px;object-fit:cover;object-position:center 15%;display:block;border-radius:50%;"/>
		</div> 
	<div th:if="${member.name == 'Ananya Shree'}"
			style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;">
		<img src="/img/Ananya.jpg" alt="Ananya Shree"
			style="width:90px;height:90px;object-fit:cover;object-position:center 15%;display:block;border-radius:50%;"/>
		</div>
	<div th:if="${member.name == 'Sneha Singh'}"
	 		style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;">
		<img src="/img/Sneha.jpg" alt="Sneha Singh"
			style="width:90px;height:90px;object-fit:cover;object-position:center 15%;display:block;border-radius:50%;"/>
		</div>
		
		
	<div th:if="${member.name != 'Mayank Raj' and member.name != 'Akshay Raj Saxena' and member.name != 'Adrija Ghosh' and member.name != 'Ananya Shree' and member.name != 'Sneha Singh'}"
	     class="member-avatar"
	     th:style="'background:' + ${member.gradient} + ';box-shadow:0 0 28px ' + ${member.glow}"
	     th:text="${member.initial}">
	</div>
	
  <div class="page-header-text"> 
    <h1><em th:text="${member.name}">Name</em></h1>
    <p th:text="'Responsible for: ' + ${member.role}">Role</p>
  </div>
</div>

<div class="content">

  <!-- Loop over entity sections -->
  <div th:each="section : ${member.sections}">

    <div class="section-head">
      <h2 th:text="${section.entity}">Entity</h2>
      <div class="line"></div>
      <a th:href="'/' + ${section.path}" class="entity-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        View <span th:text="${section.entity}">Entity</span>
      </a>
    </div>

    <div class="api-grid">
      <!-- Clickable card when uiPath is present -->
      <a th:if="${api.uiPath != null}"
         th:each="api : ${section.apis}"
         th:href="${api.uiPath}"
         class="api-card">
        <div class="api-top">
          <span th:class="'method-badge method-' + ${api.method}" th:text="${api.method}">GET</span>
          <span class="api-path" th:text="${api.path}">/api/example</span>
        </div>
        <div class="api-desc" th:text="${api.description}">Description</div>
        <span class="api-action">Open in UI →</span>
      </a>
      <!-- Non-clickable card when no uiPath -->
      <div th:if="${api.uiPath == null}"
           th:each="api : ${section.apis}"
           class="api-card no-link">
        <div class="api-top">
          <span th:class="'method-badge method-' + ${api.method}" th:text="${api.method}">GET</span>
          <span class="api-path" th:text="${api.path}">/api/example</span>
        </div>
        <div class="api-desc" th:text="${api.description}">Description</div>
      </div>
    </div>

  </div>

</div>

<footer class="footer">
  <span>Film Rental Store &copy; 2026</span>
  <span>UI <code style="color:var(--gold);font-size:.75rem">:8081</code> &rarr; API <code style="color:var(--gold);font-size:.75rem">:8082</code></span>
</footer>

</body>
</html>
