<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title th:text="${paymentId != null} ? 'Edit Payment — Film Rental' : 'New Payment — Film Rental'">Payment Form</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:text="${paymentId != null} ? 'Edit Payment' : 'New Payment'"><span>Payment</span></h1></div>
    <a href="/payments" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:action="${paymentId != null} ? @{/payments/{id}/update(id=${paymentId})} : @{/payments/save}" method="post">
      <div class="form-group">
        <label>Customer ID *</label>
        <input name="customerId" type="number" required th:value="${payment != null ? payment.customerId : ''}"/>
        <p class="hint"><a href="/customers" style="color:var(--gold)">Browse customers →</a></p>
      </div>
      <div class="form-group">
        <label>Staff ID *</label>
        <input name="staffId" type="number" required th:value="${payment != null ? payment.staffId : ''}"/>
        <p class="hint"><a href="/staff" style="color:var(--gold)">Browse staff →</a></p>
      </div>
      <div class="form-group">
        <label>Rental ID *</label>
        <input name="rentalId" type="number" required th:value="${payment != null ? payment.rentalId : ''}"/>
        <p class="hint"><a href="/rentals" style="color:var(--gold)">Browse rentals →</a></p>
      </div>
      <div class="form-group">
        <label>Amount *</label>
        <input name="amount" type="text" required placeholder="4.99" th:value="${payment != null ? payment.amount : ''}"/>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" th:text="${paymentId != null} ? 'Update' : 'Save'">Save</button>
        <a href="/payments" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
