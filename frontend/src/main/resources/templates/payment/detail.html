<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Payment Detail — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1>Payment <span th:text="'#'+${payment.paymentId}"></span></h1></div>
    <div style="display:flex;gap:.5rem"><a th:href="@{/payments/{id}/edit(id=${payment.paymentId})}" class="btn btn-primary">Edit</a><a href="/payments" class="btn btn-ghost">← Back</a></div>
  </div>
  <div class="card"><div class="card-body"><dl class="detail-grid">
    <dt>Payment ID</dt><dd th:text="${payment.paymentId}"></dd>
    <dt>Customer ID</dt><dd th:text="${payment.customerId}"></dd>
    <dt>Staff ID</dt><dd th:text="${payment.staffId}"></dd>
    <dt>Rental ID</dt><dd th:text="${payment.rentalId}"></dd>
    <dt>Amount</dt><dd th:text="${payment.amount}"></dd>
    <dt>Payment Date</dt><dd th:text="${payment.paymentDate}"></dd>
    <dt>Last Update</dt><dd th:text="${payment.lastUpdate}"></dd>
  </dl></div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
