<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Customers — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div><h1><span>Customers</span></h1><p>All customers</p></div>
    <a href="/customers/create" class="btn btn-primary">+ Add Customer</a>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <form class="filter-panel" method="get" th:action="@{/customers}">
    <div class="filter-field"><label>Store ID</label><input name="storeId" type="number" th:value="${filterStoreId}" placeholder="1"/></div>
    <div class="filter-actions">
      <button type="submit" class="btn btn-primary">Filter</button>
      <a href="/customers" class="btn btn-ghost">Clear</a>
    </div>
  </form>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Store ID</th><th>Active</th><th>Actions</th></tr></thead>
    <tbody>
      <tr th:if="${customers == null or customers.isEmpty()}"><td colspan="7"><div class="empty-state"><p>No customers.</p></div></td></tr>
      <tr th:each="c : ${customers}">
        <td th:text="${c.customerId}"></td><td th:text="${c.firstName}"></td><td th:text="${c.lastName}"></td>
        <td th:text="${c.email}"></td><td th:text="${c.storeId}"></td>
        <td th:text="${c.active != null and c.active ? 'Yes' : 'No'}"></td>
        <td><div class="row-actions">
          <a class="action-btn view" th:href="@{/customers/{id}(id=${c.customerId})}">View</a>
          <a class="action-btn edit" th:href="@{/customers/{id}/edit(id=${c.customerId})}">Edit</a>
        </div></td>
      </tr>
    </tbody>
  </table>
      <div th:replace="~{fragments/pagination :: pagination('/customers', ${currentPage}, ${totalPages})}"></div>
</div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
