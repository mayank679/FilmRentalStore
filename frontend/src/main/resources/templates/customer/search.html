<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Search Customers — Film Rental</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .filter-field.locked input { opacity:.35; pointer-events:none; background:var(--surface); cursor:not-allowed; }
    .filter-field.locked label { opacity:.4; }
    .filter-field.active label { color:var(--gold); font-weight:500; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div>
      <h1>Search <span>Customers</span></h1>
      <p th:if="${mode == null}">Select a search mode</p>
      <p th:if="${mode == 'id'}">GET /api/customers/{id} — Find customer by ID</p>
      <p th:if="${mode == 'storeId'}">GET /api/customers/store/{storeId} — Get customers by store</p>
    </div>
    <a href="/customers" class="btn btn-ghost">← Back</a>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <form class="filter-panel" method="get" th:action="@{/customers/search}">
    <input type="hidden" name="mode" th:value="${mode}"/>
    <div th:class="${mode == 'id'} ? 'filter-field active' : 'filter-field locked'">
      <label>Customer ID</label>
      <input name="id" type="number" th:value="${searchId}" placeholder="1" th:readonly="${mode != 'id'}"/>
    </div>
    <div th:class="${mode == 'storeId'} ? 'filter-field active' : 'filter-field locked'">
      <label>Store ID</label>
      <input name="storeId" type="number" th:value="${searchStoreId}" placeholder="1" th:readonly="${mode != 'storeId'}"/>
    </div>
    <div class="filter-actions">
      <button type="submit" class="btn btn-primary">Search</button>
      <a href="/customers" class="btn btn-ghost">← Customers</a>
    </div>
  </form>
  <div class="card" th:if="${customers != null}">
    <div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(customers)}"><td colspan="5"><div class="empty-state"><p>No results found.</p></div></td></tr>
        <tr th:each="c : ${customers}">
          <td th:text="${c.customerId}"></td><td th:text="${c.firstName}"></td><td th:text="${c.lastName}"></td><td th:text="${c.email}"></td>
          <td><div class="row-actions">
            <a class="action-btn view" th:href="@{/customers/{id}(id=${c.customerId})}">View</a>
            <a class="action-btn edit" th:href="@{/customers/{id}/edit(id=${c.customerId})}">Edit</a>
          </div></td>
        </tr>
      </tbody>
    </table></div>
  </div>
  <div th:replace="~{fragments/pagination :: pagination('/customers/search', ${currentPage}, ${totalPages})}"></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
