<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Staff Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:if="${staff==null}">Add <span>Staff</span></h1><h1 th:if="${staff!=null}">Edit <span>Staff</span></h1></div>
    <a href="/staff" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:if="${staff==null}" action="/staff/save" method="post">
      <div class="form-group"><label>First Name *</label><input name="firstName" type="text" required/></div>
      <div class="form-group"><label>Last Name *</label><input name="lastName" type="text" required/></div>
      <div class="form-group"><label>Username *</label><input name="username" type="text" required/></div>
      <div class="form-group"><label>Email</label><input name="email" type="email"/></div>
      <div class="form-group"><label>Address ID *</label><input name="addressId" type="number" required/>
        <p class="hint"><a href="/addresses" style="color:var(--gold)">Browse addresses →</a></p></div>
      <div class="form-group"><label>Store ID *</label><input name="storeId" type="number" required/>
        <p class="hint"><a href="/stores" style="color:var(--gold)">Browse stores →</a></p></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><a href="/staff" class="btn btn-ghost">Cancel</a></div>
    </form>
    <form th:if="${staff!=null}" th:action="@{/staff/{id}/update(id=${staffId})}" method="post">
      <div class="form-group"><label>First Name *</label><input name="firstName" type="text" th:value="${staff.firstName}" required/></div>
      <div class="form-group"><label>Last Name *</label><input name="lastName" type="text" th:value="${staff.lastName}" required/></div>
      <div class="form-group"><label>Username *</label><input name="username" type="text" th:value="${staff.username}" required/></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" th:value="${staff.email}"/></div>
      <div class="form-group"><label>Address ID *</label><input name="addressId" type="number" th:value="${staff.addressId}" required/></div>
      <div class="form-group"><label>Store ID *</label><input name="storeId" type="number" th:value="${staff.storeId}" required/></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Update</button><a href="/staff" class="btn btn-ghost">Cancel</a></div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
