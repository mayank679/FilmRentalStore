<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Film-Category Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:text="${filmcategory != null} ? 'Edit Film-Category' : 'Add Film-Category'"><span>Film-Category</span></h1></div>
    <a href="/filmcategories" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:action="${filmcategory != null} ? @{/filmcategories/{f}/{c}/update(f=${filmcategory.filmId},c=${filmcategory.categoryId})} : @{/filmcategories/save}" method="post">
      <div th:if="${filmcategory != null}">
        <div class="form-group"><label>New Film ID *</label><input name="newFilmId" type="number" required th:value="${filmcategory.filmId}"/></div>
        <div class="form-group"><label>New Category ID *</label><input name="newCategoryId" type="number" required th:value="${filmcategory.categoryId}"/></div>
      </div>
      <div th:if="${filmcategory == null}">
        <div class="form-group"><label>Film ID *</label><input name="filmId" type="number" required placeholder="1"/></div>
        <div class="form-group"><label>Category ID *</label><input name="categoryId" type="number" required placeholder="1"/></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" th:text="${filmcategory != null} ? 'Update' : 'Save'">Save</button>
        <a href="/filmcategories" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
