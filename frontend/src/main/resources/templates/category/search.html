<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Search Categories — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div th:replace="~{fragments/alert :: toasts}"></div>
  <div class="page-header">
    <div><h1>Search <span>Categories</span></h1><p>Look up by ID</p></div>
    <a href="/categories" class="btn btn-ghost">← Back</a>
  </div>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <form class="filter-panel" method="get" th:action="@{/categories/search}">
    <div class="filter-field"><label>Category ID</label><input name="categoryId" type="number" th:value="${searchId}" placeholder="1"/></div>
    <div class="filter-actions"><button type="submit" class="btn btn-primary">Find</button><a href="/categories/search" class="btn btn-ghost">Clear</a></div>
  </form>
  <div class="card" th:if="${category != null}"><div class="card-body">
    <dl class="detail-grid">
      <dt>Category ID</dt><dd th:text="${category.categoryId}"></dd>
      <dt>Name</dt><dd><span class="badge" th:text="${category.name}"></span></dd>
      <dt>Last Update</dt><dd th:text="${category['lastUpdate']}"></dd>
    </dl>
    <div style="margin-top:1rem;display:flex;gap:.5rem">
      <a class="btn btn-outline" th:href="@{/categories/{id}(id=${category.categoryId})}">View Detail</a>
      <a class="btn btn-ghost" th:href="@{/categories/{id}/edit(id=${category.categoryId})}">Edit</a>
    </div>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
