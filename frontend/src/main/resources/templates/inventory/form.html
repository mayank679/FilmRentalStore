<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Inventory Form — Film Rental</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/members" class="navbar-brand"><img th:src="@{/img/logo.svg}" alt=""/><span>Film<em>Rental</em></span></a>
  <a href="/members" style="font-size:.75rem;color:var(--gold-dim);text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:5px;transition:color .2s;">&#128101; Team</a>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <div><h1 th:if="${item==null}">Add <span>Inventory</span></h1><h1 th:if="${item!=null}">Edit <span>Inventory</span></h1></div>
    <a href="/inventory" class="btn btn-ghost">← Back</a>
  </div>
  <div class="card form-card"><div class="card-body">
    <form th:if="${item==null}" action="/inventory/save" method="post">
      <div class="form-group"><label>Film ID *</label><input name="filmId" type="number" required/>
        <p class="hint"><a href="/films" style="color:var(--gold)">Browse films →</a></p></div>
      <div class="form-group"><label>Store ID *</label><input name="storeId" type="number" required/>
        <p class="hint"><a href="/stores" style="color:var(--gold)">Browse stores →</a></p></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><a href="/inventory" class="btn btn-ghost">Cancel</a></div>
    </form>
    <form th:if="${item!=null}" th:action="@{/inventory/{id}/update(id=${inventoryId})}" method="post">
      <div class="form-group"><label>Film ID *</label><input name="filmId" type="number" th:value="${item.filmId}" required/></div>
      <div class="form-group"><label>Store ID *</label><input name="storeId" type="number" th:value="${item.storeId}" required/></div>
      <div class="form-actions"><button type="submit" class="btn btn-primary">Update</button><a href="/inventory" class="btn btn-ghost">Cancel</a></div>
    </form>
  </div></div>
</div>
<footer class="footer"><span>Film Rental Store &copy; 2026</span></footer>
</body></html>
