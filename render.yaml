services:
  # Backend API Service
  - type: web
    name: film-rental-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend.Dockerfile
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  # Frontend UI Service
  - type: web
    name: film-rental-frontend
    runtime: docker
    dockerContext: .
    dockerfilePath: frontend.Dockerfile
    envVars:
      - key: PORT
        value: 8081
      - key: BACKEND_URL
        value: https://film-rental-backend.onrender.com/api
